services:

  mysql:
    image: mysql:8.4
    container_name: smart-mysql
    restart: always

    environment:
      MYSQL_DATABASE: smart_enroll
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: smart-redis
    restart: always

    ports:
      - "6379:6379"

  spring:
    build: .
    container_name: smart-enroll

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/smart_enroll?serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}
      ADMIN_KEY: ${ADMIN_KEY}

volumes:
  mysql-data:
